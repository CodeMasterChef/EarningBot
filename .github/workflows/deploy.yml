name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            DEPLOY_DIR=~/EarningBot

            # First time setup
            if [ ! -d "$DEPLOY_DIR" ]; then
              git clone https://github.com/CodeMasterChef/EarningBot.git "$DEPLOY_DIR"
              cd "$DEPLOY_DIR"
              npm install
              npx playwright install --with-deps chromium
              npm run build
              # Remind to create .env
              echo "⚠️  Create $DEPLOY_DIR/.env with TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID"
            else
              cd "$DEPLOY_DIR"
              git pull origin main
              npm install
              npm run build
            fi

            # Init data dir
            mkdir -p data
            [ ! -f data/state.json ] && echo '{"known_events":{},"joined_events":{}}' > data/state.json

            # Restart with pm2
            if command -v pm2 &> /dev/null; then
              pm2 restart poolx-bot 2>/dev/null || pm2 start ecosystem.config.js
              pm2 save
            else
              npm install -g pm2
              pm2 start ecosystem.config.js
              pm2 save
              pm2 startup | tail -1 | bash
            fi

            echo "✅ Deploy complete"
